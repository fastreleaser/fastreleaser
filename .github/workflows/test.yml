name: test

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - fastrelease/*
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - run: GO111MODULE=off go test

