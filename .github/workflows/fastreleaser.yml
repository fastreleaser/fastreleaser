name: fastreeleaser

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fastreeleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache: false
      - run: |
          go run main.go
          go run main.go --version

